name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier formatting checks
        id: prettier
        run: npx prettier --check .
        continue-on-error: true

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintResult = ${{ steps.eslint.outcome === 'success' ? '✅ Passed' : '❌ Failed' }};
            const prettierResult = ${{ steps.prettier.outcome === 'success' ? '✅ Passed' : '❌ Failed' }};
            const eslintOutput = `${{ steps.eslint.outputs.stdout || steps.eslint.outputs.stderr || 'No output' }}`;
            const prettierOutput = `${{ steps.prettier.outputs.stdout || steps.prettier.outputs.stderr || 'No output' }}`;

            const comment = `
            ## Code Quality Report
            ### ESLint: ${eslintResult}
            \`\`\`
            ${eslintOutput}
            \`\`\`

            ### Prettier: ${prettierResult}
            \`\`\`
            ${prettierOutput}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite with coverage
        id: tests
        run: npm test -- --coverage
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = ${{ steps.tests.outcome === 'success' ? '✅ Passed' : '❌ Failed' }};
            const testOutput = `${{ steps.tests.outputs.stdout || steps.tests.outputs.stderr || 'No output' }}`;

            const comment = `
            ## Test Coverage Report
            ### Test Suite: ${testResult}
            \`\`\`
            ${testOutput}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check (npm audit)
        id: npm-audit
        run: npm audit --json || echo '{"advisories": {}}'
        continue-on-error: true

      - name: Scan for secrets in code changes
        id: secrets-scan
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
        continue-on-error: true

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const auditResult = ${{ steps.npm-audit.outcome === 'success' ? '✅ No critical vulnerabilities found' : '⚠️ Vulnerabilities detected' }};
            const secretsResult = ${{ steps.secrets-scan.outcome === 'success' ? '✅ No secrets found' : '⚠️ Potential secrets detected' }};
            const auditOutput = `${{ steps.npm-audit.outputs.stdout || 'No vulnerability data' }}`;
            const secretsOutput = `${{ steps.secrets-scan.outputs.stdout || 'No secrets scan output' }}`;

            const comment = `
            ## Security Scan Report
            ### Dependencies: ${auditResult}
            \`\`\`
            ${auditOutput}
            \`\`\`

            ### Secrets Scan: ${secretsResult}
            \`\`\`
            ${secretsOutput}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: npm run build
        continue-on-error: true

      - name: Validate endpoints (build output check)
        id: endpoints
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build directory (dist/) exists"
          else
            echo "❌ Build directory (dist/) missing"
            exit 1
          fi
        continue-on-error: true

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          if-no-files-found: warn

      - name: Post Build Validation Status
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = ${{ steps.build.outcome === 'success' ? '✅ Build successful' : '❌ Build failed' }};
            const endpointsResult = ${{ steps.endpoints.outcome === 'success' ? '✅ Endpoints validated' : '❌ Endpoint validation failed' }};
            const buildOutput = `${{ steps.build.outputs.stdout || steps.build.outputs.stderr || 'No build output' }}`;
            const endpointsOutput = `${{ steps.endpoints.outputs.stdout || steps.endpoints.outputs.stderr || 'No endpoint validation output' }}`;

            const comment = `
            ## Build Validation
            ### Build Status: ${buildResult}
            \`\`\`
            ${buildOutput}
            \`\`\`

            ### Endpoint Validation: ${endpointsResult}
            \`\`\`
            ${endpointsOutput}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
